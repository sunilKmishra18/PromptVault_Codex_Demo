<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}PromptVault{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
  </head>
  <body class="bg-slate-50 min-h-screen text-slate-800">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
      <nav class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
        <a href="{{ url_for('home') }}" class="text-xl font-bold text-indigo-600">PromptVault</a>
        <div class="flex gap-4 text-sm font-medium">
          <a href="{{ url_for('home') }}" class="hover:text-indigo-600">Home</a>
          <a href="{{ url_for('add_prompt') }}" class="hover:text-indigo-600">Add Prompt</a>
          <a href="{{ url_for('search_prompts') }}" class="hover:text-indigo-600">Search</a>
        </div>
      </nav>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="space-y-2 mb-6">
            {% for category, message in messages %}
              <div class="rounded-md px-4 py-3 text-sm {% if category == 'success' %}bg-emerald-100 text-emerald-800{% else %}bg-rose-100 text-rose-700{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
